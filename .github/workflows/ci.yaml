name: CI
 
on:
  pull_request:
    types: [closed]
    branches: [main]
    paths-ignore:
      - 'k8s/deployment.yaml'   # CI 봇 자동 커밋 → 무한루프 방지
 
env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 486053612615.dkr.ecr.eu-west-2.amazonaws.com
  ECR_REPOSITORY: raffle-app
 
# ── Job 1: Docker 이미지 빌드 & ECR 푸시 ─────────────────
jobs:
  build-and-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}   # 다음 job에 태그 전달
 
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}
 
      - name: 이미지 태그 설정
        id: set-tag
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
 
      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Docker 이미지 빌드
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
 
      - name: ECR 푸시
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
 
# ── Job 2: deployment.yaml 업데이트 → ArgoCD 카나리 배포 트리거 ──
  deploy-canary:
    name: 🚀 Deploy Canary (ArgoCD)
    runs-on: ubuntu-latest
    needs: build-and-push   # build & push job 성공 후 실행
 
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}
 
      - name: v2 이미지 태그 교체
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          sed -i "s|image: $ECR_REGISTRY/$ECR_REPOSITORY:.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" k8s/deployment.yaml
          echo "✅ 교체된 이미지 태그: $IMAGE_TAG"
          grep "image:" k8s/deployment.yaml
 
      - name: deployment.yaml 커밋 & 푸시
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git stash
          git pull origin main --rebase
          git stash pop
          git add k8s/deployment.yaml
          git commit -m "ci: update canary image tag to $IMAGE_TAG" || echo "변경 없음"
          git push
 
# ── Job 3: 배포 완료 알림 ─────────────────────────────────
  notify:
    name: ✅ Notify Deployment
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-canary]   # 두 job 모두 성공 후 실행
    if: always()                    # 성공/실패 상관없이 항상 실행
 
    steps:
      - name: 배포 성공 알림
        if: needs.build-and-push.result == 'success' && needs.deploy-canary.result == 'success'
        run: |
          echo "🎉 카나리 배포 완료!"
          echo "📦 이미지 태그: ${{ needs.build-and-push.outputs.image_tag }}"
          echo "🔗 ECR: $ECR_REGISTRY/$ECR_REPOSITORY:${{ needs.build-and-push.outputs.image_tag }}"
 
      - name: 배포 실패 알림
        if: needs.build-and-push.result == 'failure' || needs.deploy-canary.result == 'failure'
        run: |
          echo "❌ 배포 실패!"
          echo "Build 결과: ${{ needs.build-and-push.result }}"
          echo "Deploy 결과: ${{ needs.deploy-canary.result }}"
          exit 1