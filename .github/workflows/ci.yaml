name: CI

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths-ignore:
      - 'k8s/deployment.yaml'   # CI 봇 자동 커밋 → 무한루프 방지

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 486053612615.dkr.ecr.eu-west-2.amazonaws.com
  ECR_REPOSITORY: raffle-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true   # 머지된 PR만 실행

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 & ECR 푸시
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # deployment.yaml의 v2 이미지 태그를 새 SHA로 교체
      # ArgoCD가 이 변경을 감지 → v2 파드 자동 업데이트
      - name: deployment.yaml 이미지 태그 업데이트
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image: $ECR_REGISTRY/$ECR_REPOSITORY:.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" k8s/deployment.yaml

      - name: deployment.yaml 커밋 & 푸시
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git stash
          git pull origin main --rebase
          git stash pop
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to $IMAGE_TAG" || echo "변경 없음"
          git push
