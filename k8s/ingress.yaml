apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raffle-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # v1: 90%, v2(카나리): 10%
    # 검증 후 100/0 또는 0/100으로 조정
    alb.ingress.kubernetes.io/actions.canary-routing: >
      {"type":"forward","forwardConfig":{"targetGroups":[
        {"serviceName":"raffle-service-v1","servicePort":"80","weight":90},
        {"serviceName":"raffle-service-v2","servicePort":"80","weight":10}
      ]}}
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: canary-routing
                port:
                  name: use-annotation
