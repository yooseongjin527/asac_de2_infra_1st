apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raffle-ingress
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /

    alb.ingress.kubernetes.io/actions.raffle-canary: >
      {
        "type":"forward",
        "forwardConfig":{
          "targetGroups":[
            {
              "serviceName":"raffle-service-v1",
              "servicePort":"80",
              "weight":90
            },
            {
              "serviceName":"raffle-service-v2",
              "servicePort":"80",
              "weight":10
            }
          ]
        }
      }
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: raffle-canary
                port:
                  name: use-annotation