# 1. 실제 v1 앱으로 연결되는 서비스
apiVersion: v1
kind: Service
metadata:
  name: raffle-service-v1
spec:
  type: ClusterIP
  selector:
    app: raffle
    version: v1
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
# 2. 실제 v2 앱으로 연결되는 서비스
apiVersion: v1
kind: Service
metadata:
  name: raffle-service-v2
spec:
  type: ClusterIP
  selector:
    app: raffle
    version: v2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
# 3. Ingress가 문지기로 사용하는 가짜 서비스 (Canary용)
apiVersion: v1
kind: Service
metadata:
  name: raffle-canary
spec:
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
