spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: raffle-app-v2
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50