# V1 배포 (기존 버전)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raffle-app-v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raffle
      version: v1
  template:
    metadata:
      labels:
        app: raffle
        version: v1
    spec:
      containers:
      - name: raffle-container
        image: 486053612615.dkr.ecr.eu-west-2.amazonaws.com/my-raffle-app:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: raffle-config
        - secretRef:
            name: raffle-secret
---
# V2 배포 (신규 버전 - 시연 시 깃액션이 띄워줄 파드)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raffle-app-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raffle
      version: v2
  template:
    metadata:
      labels:
        app: raffle
        version: v2
    spec:
      containers:
      - name: raffle-container
        image: 486053612615.dkr.ecr.eu-west-2.amazonaws.com/my-raffle-app:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: raffle-config
        - secretRef:
            name: raffle-secret
