# V1 — 안정 버전 (이미지 태그 수동 관리)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raffle-app-v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raffle
      version: v1
  template:
    metadata:
      labels:
        app: raffle
        version: v1
    spec:
      containers:
      - name: raffle-container
        image: 486053612615.dkr.ecr.eu-west-2.amazonaws.com/raffle-app:9ff615b8f56bb4100e6c649913d7b5f967db0f47
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: raffle-config
        - secretRef:
            name: raffle-secret
---
# V2 — 카나리 버전 (CI가 이미지 태그 자동 업데이트)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raffle-app-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raffle
      version: v2
  template:
    metadata:
      labels:
        app: raffle
        version: v2
    spec:
      containers:
      - name: raffle-container
        # CI가 머지될 때마다 아래 태그를 commit SHA로 자동 교체
        image: 486053612615.dkr.ecr.eu-west-2.amazonaws.com/raffle-app:9ff615b8f56bb4100e6c649913d7b5f967db0f47
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: raffle-config
        - secretRef:
            name: raffle-secret