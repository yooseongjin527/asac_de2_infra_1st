apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  # terraform output karpenter_node_role_name 값으로 교체
  role: "KarpenterNodeRole-data-engineer-cluster"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: data-engineer-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: data-engineer-cluster
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 20Gi
        volumeType: gp3
        deleteOnTermination: true
