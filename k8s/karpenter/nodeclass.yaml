apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  role: "Karpenter-my-raffle-eks-cluster-20260403065620586200000005"    # terraform output karpenter_node_role_name 값
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: my-raffle-eks-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: my-raffle-eks-cluster